name: Merge Checks

# The project's own CI: lint, type-check, and unit tests that gate merges to
# the default branch. This is the CI the /address command's tail polls after a
# push (see .claude/commands/address.md). Keep REVIEW.md's do-not-report list
# in sync with exactly what these jobs enforce.

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on PR refs only: on the default branch every push is a
# distinct merged commit whose checks must run to completion, or back-to-back
# merges leave earlier commits with cancelled (never-completed) verification.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Dependency Installation
        run: npm install
      - name: Lint
        run: npm run lint
      - name: Type Check
        run: npm run typecheck

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Dependency Installation
        run: npm install
      - name: Unit Test Run
        run: npm run test:unit
